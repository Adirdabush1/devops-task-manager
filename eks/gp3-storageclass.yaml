# Optional: make gp3 the default StorageClass on EKS (cheaper & faster than gp2).
# Apply AFTER the aws-ebs-csi-driver addon is ready. If you skip this, the postgres PVC
# uses whatever default StorageClass the cluster already has (usually gp2).
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
reclaimPolicy: Delete
