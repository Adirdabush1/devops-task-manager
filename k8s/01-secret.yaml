# Sensitive data — base64 encoded (assignment requires at least basic base64 encoding).
# The DB password lives ONLY here, never inline in a Deployment.
#   echo -n 'supersecretpassword' | base64  ->  c3VwZXJzZWNyZXRwYXNzd29yZA==
# To change it:  kubectl create secret generic task-manager-secret \
#   --from-literal=DB_PASSWORD='<new>' -n task-manager --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: task-manager-secret
  namespace: task-manager
type: Opaque
data:
  DB_PASSWORD: c3VwZXJzZWNyZXRwYXNzd29yZA==
